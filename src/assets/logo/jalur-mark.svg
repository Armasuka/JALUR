<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- J-Road body: thick J-shape -->
  <path
    d="M18 4 L18 20 Q18 26 12 26 Q6 26 6 20"
    stroke="#1D4ED8"
    stroke-width="5"
    stroke-linecap="round"
    fill="none"
